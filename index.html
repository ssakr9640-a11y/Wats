<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NotePro V9 - VIP</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-main: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a;
            --accent: #3b82f6; --border: #e2e8f0; --msg-sent: #3b82f6; --msg-received: #f1f5f9;
        }
        [data-theme="dark"] {
            --bg-main: #020617; --bg-card: #0f172a; --text-main: #f1f5f9;
            --accent: #38bdf8; --border: #1e293b; --msg-sent: #0284c7; --msg-received: #1e293b;
        }

        .theme-default { background: var(--bg-main); }
        .theme-blue { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .theme-purple { background: linear-gradient(135deg, #4c1d95, #8b5cf6); }
        .theme-sunset { background: linear-gradient(135deg, #7c2d12, #ea580c); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; transition: 0.3s; }

        /* الشاشات الأساسية */
        #vault-door, #auth-screen { position: absolute; inset: 0; z-index: 1000; display: flex; flex-direction: column; background: var(--bg-main); transition: 0.5s; }
        .notes-nav { background: #facc15; padding: 20px; font-weight: 900; font-size: 22px; color: #000; display: flex; align-items: center; gap: 10px; }
        #secretKey { flex: 1; border: none; outline: none; padding: 25px; font-size: 18px; background: #fefce8; color: #333; resize: none; }
        
        #auth-screen { display: none; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background: var(--bg-card); padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 400px; border: 1px solid var(--border); text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .auth-input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); outline: none; }
        .auth-btn { width: 100%; padding: 16px; border-radius: 14px; background: var(--accent); color: #fff; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .auth-btn:active { transform: scale(0.95); }

        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { padding: 15px 20px; font-size: 20px; font-weight: 900; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
        .section { display: none; height: calc(100vh - 75px); flex-direction: column; animation: fadeIn 0.4s ease; }
        .section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-area { padding: 15px; background: var(--bg-card); display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); outline: none; }
        .add-btn { background: var(--accent); color: white; border: none; border-radius: 14px; padding: 0 20px; cursor: pointer; font-weight: bold; }
        
        .users-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .user-card { background: var(--bg-card); padding: 15px; border-radius: 16px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .user-card img { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; border: 2px solid var(--border); }

        .profile-avatar-container { position: relative; width: 120px; height: 120px; margin: 30px auto; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 35px; object-fit: cover; border: 4px solid var(--accent); }
        .edit-avatar-btn { position: absolute; bottom: -5px; right: -5px; background: var(--accent); color: white; padding: 8px; border-radius: 50%; cursor: pointer; }

        #chat-window { position: fixed; inset: 0; z-index: 1100; display: none; flex-direction: column; background: var(--bg-main); transition: 0.3s; }
        .chat-header-actions { display: flex; gap: 15px; color: var(--accent); }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 20px; font-size: 15.5px; line-height: 1.5; position: relative; animation: msgPop 0.3s ease; }
        @keyframes msgPop { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .msg.sent { align-self: flex-end; background: var(--msg-sent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); }
        .msg.received { align-self: flex-start; background: var(--msg-received); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: pointer; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: left; display: block; }

        #typing-indicator { display: none; padding: 5px 20px; font-size: 13px; color: var(--accent); font-weight: bold; background: var(--bg-main); border-top: 1px solid var(--border); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .chat-footer { padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .msg-input-field { flex: 1; background: var(--bg-main); border: 1px solid var(--border); padding: 14px 20px; border-radius: 25px; color: var(--text-main); outline: none; }
        
        .theme-palette { display: flex; gap: 10px; padding: 10px 15px; overflow-x: auto; background: var(--bg-card); border-top: 1px solid var(--border); }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid var(--border); flex-shrink: 0; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1050; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #94a3b8; transition: 0.3s; padding: 10px; border-radius: 15px; cursor: pointer; }
        .nav-item.active { color: var(--accent); background: rgba(56, 189, 248, 0.1); transform: translateY(-3px); }

        /* واجهة المكالمة (WebRTC) */
        #call-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 2000; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .caller-info { position: absolute; top: 10vh; text-align: center; }
        .caller-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent); margin: 0 auto 15px; animation: ringPulse 2s infinite; }
        @keyframes ringPulse { 0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(56, 189, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); } }
        
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: -1; }
        #localVideo { width: 120px; height: 160px; position: absolute; bottom: 120px; right: 20px; border-radius: 16px; object-fit: cover; background: #000; border: 2px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .call-controls { position: absolute; bottom: 40px; display: flex; gap: 30px; }
        .call-btn { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: white; transition: 0.3s; }
        .btn-end { background: #ef4444; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .btn-accept { background: #22c55e; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

    <div id="vault-door">
        <div class="notes-nav"><i data-lucide="shield"></i> ملاحظات</div>
        <textarea id="secretKey" placeholder="اكتب الملاحظات أو الرمز السري..."></textarea>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 id="auth-title" style="margin-bottom: 25px; color: var(--accent); font-weight: 900;">الخزنة</h2>
            <input type="text" id="usernameInput" class="auth-input" placeholder="اسم المستخدم (@MaMA6d)">
            <input type="password" id="passwordInput" class="auth-input" placeholder="كلمة المرور">
            <button class="auth-btn" id="authBtn" onclick="executeAuth()">فتح القفل</button>
            <p style="margin-top:20px; color: var(--accent); cursor: pointer; font-weight:bold;" onclick="toggleAuthMode()" id="authToggleText">إنشاء حساب جديد</p>
        </div>
    </div>

    <div id="main-app">
        <section id="sec-chats" class="section active">
            <div class="header">المحادثات</div>
            <div class="search-area">
                <input type="text" id="addUserInput" class="search-input" placeholder="يوزر صديقك...">
                <button class="add-btn" id="addBtn" onclick="addContact()">إضافة</button>
            </div>
            <div class="users-list" id="contacts-list-container"></div>
        </section>

        <section id="sec-profile" class="section">
            <div class="header">حسابي</div>
            <div style="text-align: center;">
                <div class="profile-avatar-container">
                    <img id="myAvatarImg" class="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                    <label for="avatarInput" class="edit-avatar-btn"><i data-lucide="camera" size="18"></i></label>
                    <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadProfilePic(event)">
                </div>
                <h2 id="profileNameDisplay" style="margin-bottom: 30px;">@User</h2>
                <div style="padding: 0 20px;">
                    <div style="background:var(--bg-card); padding:20px; border-radius:16px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <strong>إشعارات التطبيق 🔔</strong>
                        <button onclick="requestNotificationPermission()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">تفعيل</button>
                    </div>
                    <div style="background:var(--bg-card); padding:20px; border-radius:16px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                        <strong>الوضع الليلي 🌙</strong>
                        <input type="checkbox" id="theme-toggle" checked style="width:22px; height:22px;">
                    </div>
                    <button onclick="logout()" style="width:100%; margin-top:15px; padding:16px; border-radius:16px; background:#ef444415; color:#ef4444; border:1px solid #ef4444; font-weight:bold; cursor:pointer;">تسجيل الخروج</button>
                </div>
            </div>
        </section>

        <div id="chat-window">
            <div class="header" style="background:var(--bg-card);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i data-lucide="arrow-right" onclick="closeChatWindow()" style="cursor: pointer;"></i>
                    <img id="chatTargetAvatar" style="width:40px; height:40px; border-radius:14px; object-fit:cover;">
                    <div>
                        <div id="chat-target-name" style="font-size: 17px; font-weight:bold;">...</div>
                        <div id="chat-status" style="font-size: 11px; color: #94a3b8;">متصل</div>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <i data-lucide="phone" onclick="initiateCall(false)" style="cursor: pointer;"></i>
                    <i data-lucide="video" onclick="initiateCall(true)" style="cursor: pointer;"></i>
                </div>
            </div>
            
            <div class="messages" id="messages-box"></div>
            <div id="typing-indicator">صديقك يكتب الآن... ✍️</div>

            <div class="theme-palette">
                <div class="theme-dot theme-default" onclick="setChatTheme('theme-default')" style="background:var(--bg-main);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-blue')" style="background:linear-gradient(135deg, #1e3a8a, #3b82f6);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-purple')" style="background:linear-gradient(135deg, #4c1d95, #8b5cf6);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-sunset')" style="background:linear-gradient(135deg, #7c2d12, #ea580c);"></div>
            </div>

            <div class="chat-footer">
                <div style="display:flex; gap:12px; align-items:center;">
                    <i data-lucide="image-plus" onclick="document.getElementById('img-input').click()" style="color:var(--accent); cursor:pointer;"></i>
                    <input type="file" id="img-input" hidden accept="image/*" onchange="sendImage(event)">
                    <input type="text" id="msg-input-field" class="msg-input-field" placeholder="رسالة..." oninput="handleTyping()">
                    <i data-lucide="send-horizontal" id="sendBtn" onclick="sendMsg()" style="color:var(--accent); cursor:pointer;"></i>
                </div>
            </div>
        </div>

        <div id="call-overlay">
            <div class="caller-info" id="callerInfoUI">
                <img id="callAvatar" class="caller-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <h2 id="callStatusText">مكالمة واردة...</h2>
            </div>
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="call-controls" id="callControls">
                <button class="call-btn btn-end" onclick="endCall()"><i data-lucide="phone-off"></i></button>
                <button class="call-btn btn-accept" id="acceptCallBtn" style="display:none;" onclick="acceptCall()"><i data-lucide="phone"></i></button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-chats" onclick="switchSection('chats')"><i data-lucide="message-square"></i></div>
            <div class="nav-item" id="nav-profile" onclick="switchSection('profile')"><i data-lucide="user"></i></div>
        </nav>
    </div>

    <audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onChildAdded, onValue, off, onDisconnect, serverTimestamp, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyCNW8oqQPlWR2xbMEVrUA7D6QxauW5c-OM",
            authDomain: "moalme-1b9fa.firebaseapp.com",
            projectId: "moalme-1b9fa",
            storageBucket: "moalme-1b9fa.firebasestorage.app",
            messagingSenderId: "485521766774",
            appId: "1:485521766774:web:8bdd58741632e2e70b6257"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const messaging = getMessaging(app);
        
        // ⚠️ الكيز بتاعتك
        const IMGBB_KEY = '8d2341c815fdc154a458b191788a1a7c'; 
        const VAPID_KEY = 'BCW3cgSQ4GYhEE4xG4GrCGUWCvee-ySz-itiI0ze2WXJzIIaFSfLymSl1xhp5z8oSvab9ypFeyZDo_RnbHEXotU';
        const PASSCODE = "2026";

        let currentAppUser = null;
        let activeChatRef = null;
        let targetUserObj = null;
        let isLoginMode = true;
        let typingTimeout;
        let contactsListeners = {};

        // WebRTC Variables
        let peerConnection;
        let localStream;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // 1. الدخول
        document.getElementById('secretKey').addEventListener('input', (e) => {
            if (e.target.value === PASSCODE) { document.getElementById('vault-door').style.display = 'none'; checkAuth(); }
        });

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "الخزنة" : "حساب جديد";
            document.getElementById('authBtn').innerText = isLoginMode ? "فتح القفل" : "إنشاء الهوية";
            document.getElementById('authToggleText').innerText = isLoginMode ? "إنشاء حساب جديد" : "لدي حساب بالفعل";
        };

        window.executeAuth = async () => {
            const user = document.getElementById('usernameInput').value.toLowerCase().replace(/[^a-z0-9]/g, '');
            const pass = document.getElementById('passwordInput').value;
            if (user.length < 3) return alert("اليوزر نيم قصير");
            const email = `${user}@vault.app`;
            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, `users/${user}`), { uid: cred.user.uid, username: user, photo: "https://cdn-icons-png.flaticon.com/512/149/149071.png", online: true });
                }
            } catch (err) { alert("تأكد من البيانات."); }
        };

        function checkAuth() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const myUser = user.email.split('@')[0];
                    const snap = await get(ref(db, `users/${myUser}`));
                    currentAppUser = snap.val();
                    
                    if(currentAppUser) {
                        document.getElementById('myAvatarImg').src = currentAppUser.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                        document.getElementById('profileNameDisplay').innerText = `@${currentAppUser.username}`;
                        
                        const statusRef = ref(db, `users/${myUser}/online`);
                        set(statusRef, true);
                        onDisconnect(statusRef).set(false);
                        onDisconnect(ref(db, `users/${myUser}/lastSeen`)).set(serverTimestamp());
                        
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'flex';
                        
                        loadContactsSafe();
                        listenForCalls(); // تشغيل مستمع المكالمات
                    } else logout();
                } else document.getElementById('auth-screen').style.display = 'flex';
            });
        }

        // 2. محاولة إصلاح الإشعارات بقوة (Force Registration)
        window.requestNotificationPermission = async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    // تسجيل الـ SW الأول عشان الفايربيز ميضربش
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: registration });
                    if (token) {
                        await update(ref(db, `users/${currentAppUser.username}`), { fcmToken: token });
                        alert("تم تفعيل الإشعارات بنجاح! 🔔");
                    }
                } else {
                    alert("تم رفض صلاحية الإشعارات من المتصفح.");
                }
            } catch (error) { console.log('Push Error:', error); alert("عفواً، جهازك يمنع الإشعارات في الخلفية."); }
        };

        onMessage(messaging, (payload) => {
            if(document.hidden && Notification.permission === "granted") {
                new Notification(payload.notification.title || 'رسالة جديدة', {
                    body: payload.notification.body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/564/564445.png'
                });
            }
        });

        // تحويل الوقت
        function timeAgo(timestamp) {
            if (!timestamp) return "غير معروف";
            const diff = Math.floor((Date.now() - timestamp) / 1000);
            if (diff < 60) return "الآن";
            if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
            if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
            return new Date(timestamp).toLocaleDateString('ar-EG');
        }

        window.uploadProfilePic = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('myAvatarImg').style.opacity = "0.5";
            let fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                await update(ref(db, `users/${currentAppUser.username}`), { photo: data.data.url });
                document.getElementById('myAvatarImg').src = data.data.url;
            } catch(err) { alert("فشل الرفع"); }
            document.getElementById('myAvatarImg').style.opacity = "1";
        };

        window.addContact = async () => {
            const btn = document.getElementById('addBtn');
            const target = document.getElementById('addUserInput').value.toLowerCase().trim();
            if(!target || target === currentAppUser.username) return;
            btn.innerText = "⏳";
            const snap = await get(ref(db, `users/${target}`));
            if(snap.exists()) {
                await set(ref(db, `contacts/${currentAppUser.username}/${target}`), true);
                document.getElementById('addUserInput').value = "";
            }
            btn.innerText = "إضافة";
        };

        function loadContactsSafe() {
            const container = document.getElementById('contacts-list-container');
            onValue(ref(db, `contacts/${currentAppUser.username}`), (snap) => {
                if(!snap.exists()) { container.innerHTML = `<div style="text-align:center; color:#94a3b8; margin-top:50px;">قائمتك فارغة!</div>`; return; }
                if (container.innerHTML.includes('فارغة')) container.innerHTML = "";

                snap.forEach(child => {
                    const friendUser = child.key;
                    if (!contactsListeners[friendUser]) {
                        contactsListeners[friendUser] = true;
                        onValue(ref(db, `users/${friendUser}`), (uSnap) => {
                            const u = uSnap.val();
                            if(!u) return;
                            let card = document.getElementById(`card-${u.username}`);
                            if(!card) {
                                card = document.createElement('div');
                                card.id = `card-${u.username}`;
                                card.className = 'user-card';
                                card.onclick = () => openSafeChat(u);
                                container.appendChild(card);
                            }
                            card.innerHTML = `
                                <img src="${u.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                                <div style="flex:1">
                                    <strong style="font-size:16px;">@${u.username}</strong><br>
                                    <small style="color:${u.online ? '#22c55e' : '#94a3b8'}">${u.online ? 'متصل الآن 🟢' : `آخر ظهور ${timeAgo(u.lastSeen)}`}</small>
                                </div>
                            `;
                        });
                    }
                });
            });
        }

        let typingListenerRef = null;

        window.openSafeChat = (other) => {
            targetUserObj = other;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chatTargetAvatar').src = other.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('chat-target-name').innerText = `@${other.username}`;
            
            const chatId = currentAppUser.uid < other.uid ? `${currentAppUser.uid}_${other.uid}` : `${other.uid}_${currentAppUser.uid}`;
            
            onValue(ref(db, `users/${other.username}`), (uSnap) => {
                const uData = uSnap.val();
                if(uData) document.getElementById('chat-status').innerText = uData.online ? 'متصل الآن' : `آخر ظهور ${timeAgo(uData.lastSeen)}`;
            });

            onValue(ref(db, `chat_configs/${chatId}/theme`), (s) => document.getElementById('messages-box').className = 'messages ' + (s.val() || 'theme-default'));

            if(typingListenerRef) off(typingListenerRef);
            typingListenerRef = ref(db, `typing/${chatId}/${other.username}`);
            onValue(typingListenerRef, (s) => document.getElementById('typing-indicator').style.display = s.val() ? 'block' : 'none');

            if(activeChatRef) off(activeChatRef);
            activeChatRef = ref(db, `secure_chats/${chatId}`);
            const chatBox = document.getElementById('messages-box');
            chatBox.innerHTML = "";
            
            onChildAdded(activeChatRef, (snap) => {
                const data = snap.val();
                const isMe = data.sid === currentAppUser.uid;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'sent' : 'received'}`;
                
                const timeStr = data.ts ? new Date(data.ts).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}) : '';
                div.innerHTML = `${data.txt ? `<div>${data.txt}</div>` : ''} ${data.img ? `<img src="${data.img}" onclick="window.open('${data.img}')">` : ''}<span class="msg-time">${timeStr}</span>`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;

                if(!isMe && data.ts && (Date.now() - data.ts < 5000)) {
                    document.getElementById('popSound').play().catch(e => {});
                    if(document.hidden && Notification.permission === "granted") {
                        new Notification(`رسالة من @${other.username}`, { body: data.txt || 'صورة جديدة', icon: other.photo });
                    }
                }
            });
        };

        window.setChatTheme = (themeClass) => {
            const chatId = currentAppUser.uid < targetUserObj.uid ? `${currentAppUser.uid}_${targetUserObj.uid}` : `${targetUserObj.uid}_${currentAppUser.uid}`;
            set(ref(db, `chat_configs/${chatId}/theme`), themeClass);
        };

        window.handleTyping = () => {
            if(!targetUserObj) return;
            const chatId = currentAppUser.uid < targetUserObj.uid ? `${currentAppUser.uid}_${targetUserObj.uid}` : `${targetUserObj.uid}_${currentAppUser.uid}`;
            set(ref(db, `typing/${chatId}/${currentAppUser.username}`), true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => set(ref(db, `typing/${chatId}/${currentAppUser.username}`), false), 1500);
        };

        window.sendMsg = () => {
            const txt = document.getElementById('msg-input-field').value.trim();
            if(txt) {
                push(activeChatRef, { sid: currentAppUser.uid, txt, ts: Date.now() });
                document.getElementById('msg-input-field').value = "";
                const chatId = currentAppUser.uid < targetUserObj.uid ? `${currentAppUser.uid}_${targetUserObj.uid}` : `${targetUserObj.uid}_${currentAppUser.uid}`;
                set(ref(db, `typing/${chatId}/${currentAppUser.username}`), false);
            }
        };
        
        window.sendImage = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('msg-input-field').placeholder = "جاري رفع الصورة...";
            let fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                push(activeChatRef, { sid: currentAppUser.uid, img: data.data.url, ts: Date.now() });
            } catch(err) { alert("فشل الرفع"); }
            document.getElementById('msg-input-field').placeholder = "رسالة...";
        };

        // --- نظام المكالمات (WebRTC) ---
        function listenForCalls() {
            onValue(ref(db, `calls/${currentAppUser.username}`), async (snap) => {
                const callData = snap.val();
                if (callData && callData.offer && !peerConnection) {
                    document.getElementById('call-overlay').style.display = 'flex';
                    document.getElementById('callStatusText').innerText = `يتصل بك...`;
                    // جلب صورة المتصل
                    get(ref(db, `users/${callData.caller}`)).then(uSnap => {
                        document.getElementById('callAvatar').src = uSnap.val()?.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    });
                    document.getElementById('callerInfoUI').style.display = 'block';
                    document.getElementById('acceptCallBtn').style.display = 'flex';
                    
                    window.acceptCall = async () => {
                        document.getElementById('acceptCallBtn').style.display = 'none';
                        document.getElementById('callerInfoUI').style.display = 'none';
                        await setupWebRTC(callData.caller, callData.isVideo);
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        update(ref(db, `calls/${currentAppUser.username}`), { answer: { type: answer.type, sdp: answer.sdp }});
                    };
                } else if (!callData && peerConnection) { endCall(false); }
            });
        }

        window.initiateCall = async (isVideo) => {
            if(!targetUserObj) return;
            document.getElementById('call-overlay').style.display = 'flex';
            document.getElementById('callStatusText').innerText = "جاري الاتصال...";
            document.getElementById('callAvatar').src = targetUserObj.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('callerInfoUI').style.display = 'block';
            document.getElementById('acceptCallBtn').style.display = 'none';

            await setupWebRTC(targetUserObj.username, isVideo);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            set(ref(db, `calls/${targetUserObj.username}`), { caller: currentAppUser.username, isVideo: isVideo, offer: { type: offer.type, sdp: offer.sdp } });

            onValue(ref(db, `calls/${targetUserObj.username}/answer`), (snap) => {
                const answer = snap.val();
                if (answer && !peerConnection.currentRemoteDescription) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    document.getElementById('callerInfoUI').style.display = 'none'; 
                }
            });
        };

        async function setupWebRTC(targetId, isVideo) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) push(ref(db, `calls/${targetId}/candidates`), event.candidate.toJSON());
                };
                
                onChildAdded(ref(db, `calls/${currentAppUser.username}/candidates`), (snap) => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
                });
            } catch (error) {
                alert("يرجى السماح باستخدام الكاميرا والمايك من إعدادات المتصفح.");
                endCall();
            }
        }

        window.endCall = (deleteFromDb = true) => {
            if(peerConnection) peerConnection.close();
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            peerConnection = null;
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('remoteVideo').srcObject = null;
            if(deleteFromDb) {
                remove(ref(db, `calls/${currentAppUser.username}`));
                if(targetUserObj) remove(ref(db, `calls/${targetUserObj.username}`));
            }
        };

        // أحداث عامة
        document.getElementById('msg-input-field').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
        window.closeChatWindow = () => { document.getElementById('chat-window').style.display = 'none'; targetUserObj = null; };
        window.switchSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        };
        window.logout = async () => { await signOut(auth); localStorage.clear(); location.reload(); };
        document.getElementById('theme-toggle').onchange = (e) => document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
        if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e=>console.log(e)));
    </script>
</body>
</html>
