<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مذكراتي</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-main: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a;
            --accent: #3b82f6; --border: #e2e8f0; --msg-sent: #3b82f6; --msg-received: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-main: #020617; --bg-card: #0f172a; --text-main: #f8fafc;
            --accent: #38bdf8; --border: #1e293b; --msg-sent: #0284c7; --msg-received: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }

        /* --- واجهات التمويه --- */
        .splash { position: fixed; inset: 0; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-main); transition: opacity 0.5s; }
        .splash.hidden { opacity: 0; pointer-events: none; }
        
        #vault-door { height: 100vh; display: flex; flex-direction: column; background: #fff; position: relative; z-index: 100; }
        .notes-nav { background: #facc15; padding: 20px; font-weight: 900; font-size: 22px; color: #000; display: flex; align-items: center; gap: 10px; }
        #secretKey { flex: 1; border: none; outline: none; padding: 25px; font-size: 18px; background: #fefce8; resize: none; color: #333; line-height: 1.6; }

        /* --- واجهة التسجيل الآمنة --- */
        #auth-screen { display: none; height: 100vh; justify-content: center; align-items: center; z-index: 150; background: var(--bg-main); padding: 20px; }
        .auth-box { background: var(--bg-card); padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); outline: none; font-size: 16px; transition: 0.3s; }
        .auth-input:focus { border-color: var(--accent); }
        .auth-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 16px; transition: 0.3s; }
        .auth-btn:active { transform: scale(0.98); }
        .auth-toggle { font-size: 14px; color: var(--accent); cursor: pointer; font-weight: bold; }

        /* --- التطبيق الرئيسي --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        
        .header { padding: 20px; font-size: 22px; font-weight: 900; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
        
        .section { display: none; height: calc(100vh - 75px); flex-direction: column; }
        .section.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-area { padding: 15px; background: var(--bg-card); }
        .search-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); outline: none; }
        
        .users-list { flex: 1; overflow-y: auto; padding: 15px; }
        .user-card { background: var(--bg-card); padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .user-card:active { transform: scale(0.98); }
        .user-avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--accent); color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; }

        /* --- نافذة المحادثة المتقدمة --- */
        #chat-window { position: fixed; inset: 0; background: var(--bg-main); z-index: 1000; display: none; flex-direction: column; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.5; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--msg-sent); color: white; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--msg-received); color: var(--text-main); border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 8px; cursor: pointer; }

        .chat-footer { padding: 15px; background: var(--bg-card); display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border); padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .msg-input-field { flex: 1; background: var(--bg-main); border: 1px solid var(--border); padding: 14px; border-radius: 24px; color: var(--text-main); outline: none; }
        
        /* --- البار السفلي --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 500; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); transform: translateY(-2px); }
        .nav-item span { font-size: 11px; margin-top: 4px; font-weight: bold; }

        .settings-card { background: var(--bg-card); padding: 20px; margin: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="vault-door">
        <div class="notes-nav">
            <i data-lucide="edit-3"></i>
            مذكراتي الشخصية
        </div>
        <textarea id="secretKey" placeholder="اكتب ملاحظاتك هنا... (أدخل الرمز السري للوصول)"></textarea>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 id="auth-title" style="margin-bottom: 25px; color: var(--accent); font-weight: 900;">تسجيل الدخول 🔐</h2>
            <input type="text" id="usernameInput" class="auth-input" placeholder="اسم المستخدم (حروف وأرقام فقط)">
            <input type="password" id="passwordInput" class="auth-input" placeholder="كلمة المرور">
            <button class="auth-btn" id="authBtn" onclick="executeAuth()">دخول</button>
            <p class="auth-toggle" onclick="toggleAuthMode()" id="authToggleText">ليس لديك حساب؟ إنشاء حساب</p>
        </div>
    </div>

    <div id="main-app">
        
        <section id="sec-chats" class="section active">
            <div class="header">
                الدردشات السريّة
                <span id="myUsernameDisplay" style="font-size: 14px; color: var(--accent); font-weight: 700;"></span>
            </div>
            <div class="search-area">
                <input type="text" id="userSearch" class="search-input" placeholder="🔍 ابحث عن مستخدم لتبدأ محادثة...">
            </div>
            <div class="users-list" id="users-list-container"></div>
        </section>

        <section id="sec-settings" class="section">
            <div class="header">الإعدادات</div>
            <div class="settings-card">
                <span style="font-weight: bold;">الوضع الليلي 🌙</span>
                <input type="checkbox" id="theme-toggle" checked style="width: 22px; height: 22px;">
            </div>
            <div class="settings-card" onclick="logout()" style="cursor: pointer; border-color: #ef4444; background: #ef444410;">
                <span style="color: #ef4444; font-weight: bold;">تسجيل الخروج نهائياً</span>
                <i data-lucide="log-out" color="#ef4444"></i>
            </div>
        </section>

        <div id="chat-window">
            <div class="header" style="display: flex; align-items: center; gap: 15px; padding: 15px 20px;">
                <i data-lucide="arrow-right" onclick="closeChatWindow()" style="cursor: pointer;"></i >
                <div id="chat-avatar" class="user-avatar" style="width: 40px; height: 40px; font-size: 16px;"></div>
                <span id="chat-target-name">...</span>
            </div>
            <div class="messages" id="messages-box"></div>
            <div class="chat-footer">
                <i data-lucide="image-plus" onclick="document.getElementById('img-input').click()" style="color: var(--accent); cursor: pointer;"></i >
                <input type="file" id="img-input" hidden accept="image/*">
                <input type="text" id="msg-input-field" class="msg-input-field" placeholder="اكتب رسالة مشفرة...">
                <i data-lucide="send-horizontal" id="send-msg-btn" style="color: var(--accent); cursor: pointer;"></i >
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchSection('chats')">
                <i data-lucide="message-square"></i >
                <span>الدردشة</span>
            </div>
            <div class="nav-item" onclick="switchSection('settings')">
                <i data-lucide="settings-2"></i >
                <span>الإعدادات</span>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onChildAdded, onValue, off } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // تفعيل الأيقونات
        lucide.createIcons();

        // بيانات فايربيز 
        const firebaseConfig = {
            apiKey: "AIzaSyCNW8oqQPlWR2xbMEVrUA7D6QxauW5c-OM",
            authDomain: "moalme-1b9fa.firebaseapp.com",
            projectId: "moalme-1b9fa",
            storageBucket: "moalme-1b9fa.firebasestorage.app",
            messagingSenderId: "485521766774",
            appId: "1:485521766774:web:8bdd58741632e2e70b6257"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        // مفتاح ImgBB
        const IMGBB_KEY = '8a2ed15355e245329492172a4f7aed98'; 
        const PASSCODE = "2026";

        let currentAppUser = null;
        let activeChatRef = null;
        let chatListener = null; 
        let isLoginMode = true;

        // 1. الدخول السري
        document.getElementById('secretKey').addEventListener('input', (e) => {
            if (e.target.value === PASSCODE) {
                document.getElementById('vault-door').style.display = 'none';
                checkAuth();
            }
        });

        // 2. نظام التسجيل
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "تسجيل الدخول 🔐" : "إنشاء حساب جديد ✨";
            document.getElementById('authBtn').innerText = isLoginMode ? "دخول" : "تسجيل";
            document.getElementById('authToggleText').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب" : "لديك حساب؟ تسجيل الدخول";
        };

        window.executeAuth = async () => {
            let rawUser = document.getElementById('usernameInput').value.toLowerCase().replace(/[^a-z0-9]/g, '');
            const pass = document.getElementById('passwordInput').value;

            if (rawUser.length < 3 || pass.length < 6) {
                return alert("الرجاء إدخال اسم مستخدم صحيح وكلمة مرور لا تقل عن 6 أحرف.");
            }

            const fakeEmail = `${rawUser}@securevault.app`;
            const btn = document.getElementById('authBtn');
            btn.innerText = "جاري التحميل...";

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    await set(ref(db, `users/${cred.user.uid}`), { uid: cred.user.uid, username: rawUser });
                }
            } catch (err) {
                alert("حدث خطأ، يرجى التأكد من البيانات.");
                btn.innerText = isLoginMode ? "دخول" : "تسجيل";
            }
        };

        function checkAuth() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const snap = await get(ref(db, `users/${user.uid}`));
                    if(snap.exists()){
                        currentAppUser = snap.val();
                        document.getElementById('myUsernameDisplay').innerText = `@${currentAppUser.username}`;
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'flex';
                        loadUsersList();
                    } else {
                        logout();
                    }
                } else {
                    document.getElementById('auth-screen').style.display = 'flex';
                }
            });
        }

        window.logout = async () => {
            await signOut(auth);
            localStorage.clear();
            location.reload();
        };

        // 3. التنقلات
        window.switchSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`sec-${id}`).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        document.getElementById('theme-toggle').onchange = (e) => {
            document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
        };

        // 4. جلب المستخدمين
        function loadUsersList(search = "") {
            onValue(ref(db, 'users'), (snap) => {
                const container = document.getElementById('users-list-container');
                container.innerHTML = "";
                snap.forEach(child => {
                    const u = child.val();
                    if (currentAppUser && u.uid !== currentAppUser.uid && u.username.includes(search)) {
                        const div = document.createElement('div');
                        div.className = 'user-card';
                        div.innerHTML = `
                            <div class="user-avatar">${u.username[0].toUpperCase()}</div>
                            <div>
                                <strong style="font-size: 16px;">@${u.username}</strong>
                                <div style="font-size: 12px; color: #64748b; margin-top: 4px;">اضغط لبدء الدردشة</div>
                            </div>
                        `;
                        div.onclick = () => openSafeChat(u);
                        container.appendChild(div);
                    }
                });
            });
        }
        document.getElementById('userSearch').oninput = (e) => loadUsersList(e.target.value.toLowerCase());

        // 5. فتح المحادثة
        window.openSafeChat = (otherUser) => {
            const chatBox = document.getElementById('messages-box');
            chatBox.innerHTML = ""; 
            
            document.getElementById('chat-target-name').innerText = `@${otherUser.username}`;
            document.getElementById('chat-avatar').innerText = otherUser.username[0].toUpperCase();
            document.getElementById('chat-window').style.display = 'flex';

            if (activeChatRef && chatListener) {
                off(activeChatRef, 'child_added', chatListener);
            }

            const chatId = currentAppUser.uid < otherUser.uid ? `${currentAppUser.uid}_${otherUser.uid}` : `${otherUser.uid}_${currentAppUser.uid}`;
            activeChatRef = ref(db, `secure_chats/${chatId}`);
            
            chatListener = onChildAdded(activeChatRef, (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${data.sid === currentAppUser.uid ? 'sent' : 'received'}`;
                div.innerHTML = `${data.txt ? `<div>${data.txt}</div>` : ''} ${data.img ? `<img src="${data.img}" onclick="window.open('${data.img}')">` : ''}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        window.closeChatWindow = () => {
            document.getElementById('chat-window').style.display = 'none';
        };

        // 6. الإرسال (دعم زر Enter)
        const sendMsg = async () => {
            const text = document.getElementById('msg-input-field').value.trim();
            const file = document.getElementById('img-input').files[0];
            if (!text && !file) return;

            document.getElementById('msg-input-field').value = "";
            document.getElementById('img-input').value = "";

            let imgUrl = null;
            if (file) {
                let fd = new FormData(); fd.append('image', file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                    const d = await res.json(); imgUrl = d.data.url;
                } catch(e) { alert("فشل رفع الصورة"); return; }
            }

            push(activeChatRef, { sid: currentAppUser.uid, txt: text, img: imgUrl });
        };

        document.getElementById('send-msg-btn').onclick = sendMsg;
        document.getElementById('msg-input-field').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });

        // تسجيل الـ Service Worker لـ Vercel
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
