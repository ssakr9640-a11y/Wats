<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NotePro - النسخة الأسطورية</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-main: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a;
            --accent: #3b82f6; --border: #e2e8f0; --msg-sent: #3b82f6; --msg-received: #f1f5f9;
        }
        [data-theme="dark"] {
            --bg-main: #020617; --bg-card: #0f172a; --text-main: #f1f5f9;
            --accent: #38bdf8; --border: #1e293b; --msg-sent: #0284c7; --msg-received: #1e293b;
        }

        /* ثيمات الدردشة */
        .theme-default { background: var(--bg-main); }
        .theme-blue { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
        .theme-purple { background: linear-gradient(135deg, #4c1d95, #8b5cf6); }
        .theme-sunset { background: linear-gradient(135deg, #7c2d12, #ea580c); }
        .theme-forest { background: linear-gradient(135deg, #064e3b, #10b981); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- واجهات البداية --- */
        #vault-door, #auth-screen { position: absolute; inset: 0; z-index: 1000; display: flex; flex-direction: column; background: var(--bg-main); transition: 0.6s; }
        .notes-nav { background: #facc15; padding: 20px; font-weight: 900; font-size: 22px; color: #000; display: flex; align-items: center; gap: 10px; }
        #secretKey { flex: 1; border: none; outline: none; padding: 25px; font-size: 18px; background: #fefce8; color: #333; resize: none; }
        
        #auth-screen { display: none; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { background: var(--bg-card); padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 400px; border: 1px solid var(--border); text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); outline: none; }
        .auth-btn { width: 100%; padding: 16px; border-radius: 14px; background: var(--accent); color: #fff; font-weight: bold; border: none; cursor: pointer; }

        /* --- التطبيق الرئيسي --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { padding: 15px 20px; font-size: 20px; font-weight: 900; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
        .section { display: none; height: calc(100vh - 75px); flex-direction: column; animation: sectionFade 0.4s ease; }
        .section.active { display: flex; }
        @keyframes sectionFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* الملف الشخصي */
        .profile-section { padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .profile-avatar-container { position: relative; width: 120px; height: 120px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 35px; object-fit: cover; border: 4px solid var(--accent); background: var(--bg-card); }
        .edit-avatar-btn { position: absolute; bottom: -5px; right: -5px; background: var(--accent); color: white; padding: 8px; border-radius: 50%; cursor: pointer; border: 3px solid var(--bg-main); }

        /* الشات */
        #chat-window { position: fixed; inset: 0; z-index: 1100; display: none; flex-direction: column; transition: 0.3s; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        
        /* أنيميشن الرسايل */
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 22px; font-size: 15.5px; line-height: 1.6; animation: msgSlide 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg.sent { align-self: flex-end; background: var(--msg-sent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .msg.received { align-self: flex-start; background: var(--msg-received); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        .chat-footer { padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border); backdrop-filter: blur(10px); }
        .msg-input-field { flex: 1; background: var(--bg-main); border: 1px solid var(--border); padding: 14px 20px; border-radius: 25px; color: var(--text-main); outline: none; font-size: 15px; }

        /* بالتة الثيمات */
        .theme-palette { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: var(--bg-card); border-top: 1px solid var(--border); }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid white; flex-shrink: 0; }

        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1050; }
        .nav-item { color: #94a3b8; transition: 0.3s; padding: 10px; border-radius: 15px; }
        .nav-item.active { color: var(--accent); background: rgba(56, 189, 248, 0.1); }

        .user-card img { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; }

        #call-overlay { z-index: 2000; }
    </style>
</head>
<body>

    <div id="vault-door">
        <div class="notes-nav"><i data-lucide="shield-check"></i> ملاحظات مشفرة</div>
        <textarea id="secretKey" placeholder="اكتب ملاحظاتك السرية هنا..."></textarea>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 id="auth-title" style="margin-bottom: 25px; color: var(--accent); font-weight: 900;">الولوج للخزنة</h2>
            <input type="text" id="usernameInput" class="auth-input" placeholder="اسم المستخدم">
            <input type="password" id="passwordInput" class="auth-input" placeholder="كلمة المرور">
            <button class="auth-btn" id="authBtn" onclick="executeAuth()">فتح القفل</button>
            <p style="margin-top:20px; color: var(--accent); cursor: pointer;" onclick="toggleAuthMode()" id="authToggleText">إنشاء هوية جديدة</p>
        </div>
    </div>

    <div id="main-app">
        <section id="sec-chats" class="section active">
            <div class="header">المحادثات</div>
            <div style="padding: 15px; display: flex; gap: 10px;">
                <input type="text" id="addUserInput" style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); outline:none; background:var(--bg-card); color:var(--text-main);" placeholder="أضف صديق باليوزر نيم...">
                <button onclick="addContact()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:bold;">إضافة</button>
            </div>
            <div class="users-list" id="contacts-list-container" style="flex:1; overflow-y:auto; padding:15px;"></div>
        </section>

        <section id="sec-profile" class="section">
            <div class="header">الملف الشخصي</div>
            <div class="profile-section">
                <div class="profile-avatar-container">
                    <img id="myAvatarImg" class="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                    <label for="avatarInput" class="edit-avatar-btn"><i data-lucide="camera" size="18"></i></label>
                    <input type="file" id="avatarInput" hidden accept="image/*" onchange="uploadProfilePic(event)">
                </div>
                <h2 id="profileNameDisplay">@Username</h2>
                <div style="width:100%; max-width:400px;">
                    <div style="background:var(--bg-card); padding:20px; border-radius:20px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <span>الوضع الليلي</span>
                        <input type="checkbox" id="theme-toggle" checked style="width:22px; height:22px;">
                    </div>
                    <button onclick="logout()" style="width:100%; margin-top:20px; padding:15px; border-radius:15px; background:#ef444415; color:#ef4444; border:1px solid #ef4444; font-weight:bold;">تسجيل الخروج</button>
                </div>
            </div>
        </section>

        <div id="chat-window">
            <div class="header" id="chatHeader" style="background:var(--bg-card);">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i data-lucide="arrow-right" onclick="closeChatWindow()" style="cursor: pointer;"></i>
                    <img id="chatTargetAvatar" style="width:40px; height:40px; border-radius:12px; object-fit:cover;">
                    <div>
                        <div id="chat-target-name" style="font-size: 17px; font-weight:bold;">...</div>
                        <div id="chat-status" style="font-size: 11px; color: #94a3b8;">متصل</div>
                    </div>
                </div>
                <div style="display:flex; gap:15px; color:var(--accent);">
                    <i data-lucide="phone" onclick="initiateCall(false)"></i>
                    <i data-lucide="video" onclick="initiateCall(true)"></i>
                </div>
            </div>
            
            <div class="messages" id="messages-box"></div>
            
            <div id="typing-indicator" style="display:none; padding:5px 20px; font-size:12px; color:var(--accent); font-style:italic;">جاري الكتابة...</div>

            <div class="theme-palette">
                <div class="theme-dot theme-default" onclick="setChatTheme('theme-default')" style="background:var(--bg-main);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-blue')" style="background:linear-gradient(135deg, #1e3a8a, #3b82f6);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-purple')" style="background:linear-gradient(135deg, #4c1d95, #8b5cf6);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-sunset')" style="background:linear-gradient(135deg, #7c2d12, #ea580c);"></div>
                <div class="theme-dot" onclick="setChatTheme('theme-forest')" style="background:linear-gradient(135deg, #064e3b, #10b981);"></div>
            </div>

            <div class="chat-footer">
                <div style="display:flex; gap:12px; align-items:center;">
                    <i data-lucide="plus-circle" onclick="document.getElementById('img-input').click()" style="color:var(--accent);"></i>
                    <input type="file" id="img-input" hidden accept="image/*" onchange="sendImage(event)">
                    <input type="text" id="msg-input-field" class="msg-input-field" placeholder="رسالة..." oninput="handleTyping()">
                    <i data-lucide="send" id="sendBtn" onclick="sendMsg()" style="color:var(--accent);"></i>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-chats" onclick="switchSection('chats')"><i data-lucide="message-circle"></i></div>
            <div class="nav-item" id="nav-profile" onclick="switchSection('profile')"><i data-lucide="user"></i></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onChildAdded, onValue, off, onDisconnect, serverTimestamp, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyCNW8oqQPlWR2xbMEVrUA7D6QxauW5c-OM",
            authDomain: "moalme-1b9fa.firebaseapp.com",
            projectId: "moalme-1b9fa",
            storageBucket: "moalme-1b9fa.firebasestorage.app",
            messagingSenderId: "485521766774",
            appId: "1:485521766774:web:8bdd58741632e2e70b6257"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const IMGBB_KEY = '8d2341c815fdc154a458b191788a1a7c'; 
        const PASSCODE = "2026";

        let currentAppUser = null;
        let activeChatRef = null;
        let targetUserObj = null;
        let isLoginMode = true;
        let typingTimeout;

        // 1. الدخول
        document.getElementById('secretKey').addEventListener('input', (e) => {
            if (e.target.value === PASSCODE) { document.getElementById('vault-door').style.display = 'none'; checkAuth(); }
        });

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "الولوج للخزنة" : "إنشاء هوية";
        };

        window.executeAuth = async () => {
            const user = document.getElementById('usernameInput').value.toLowerCase().replace(/[^a-z0-9]/g, '');
            const pass = document.getElementById('passwordInput').value;
            if (user.length < 3) return alert("اليوزر نيم قصير");
            const email = `${user}@vault.app`;
            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, `users/${user}`), { uid: cred.user.uid, username: user, photo: "https://cdn-icons-png.flaticon.com/512/149/149071.png", online: true });
                }
            } catch (err) { alert("خطأ في البيانات"); }
        };

        function checkAuth() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    const myUser = user.email.split('@')[0];
                    onValue(ref(db, `users/${myUser}`), (snap) => {
                        currentAppUser = snap.val();
                        document.getElementById('myAvatarImg').src = currentAppUser.photo;
                        document.getElementById('profileNameDisplay').innerText = `@${currentAppUser.username}`;
                        
                        // تواجد
                        const statusRef = ref(db, `users/${myUser}/online`);
                        set(statusRef, true);
                        onDisconnect(statusRef).set(false);
                        onDisconnect(ref(db, `users/${myUser}/lastSeen`)).set(serverTimestamp());
                    });
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    loadContacts();
                } else {
                    document.getElementById('auth-screen').style.display = 'flex';
                }
            });
        }

        // 2. الملف الشخصي
        window.uploadProfilePic = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            let fd = new FormData(); fd.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
            const data = await res.json();
            await update(ref(db, `users/${currentAppUser.username}`), { photo: data.data.url });
        };

        // 3. المحادثات
        window.addContact = async () => {
            const target = document.getElementById('addUserInput').value.toLowerCase().trim();
            if(!target || target === currentAppUser.username) return;
            const snap = await get(ref(db, `users/${target}`));
            if(snap.exists()) {
                await set(ref(db, `contacts/${currentAppUser.username}/${target}`), true);
                document.getElementById('addUserInput').value = "";
            } else alert("المستخدم غير موجود");
        };

        function loadContacts() {
            onValue(ref(db, `contacts/${currentAppUser.username}`), (snap) => {
                const container = document.getElementById('contacts-list-container');
                container.innerHTML = "";
                snap.forEach(child => {
                    onValue(ref(db, `users/${child.key}`), (uSnap) => {
                        const u = uSnap.val();
                        let card = document.getElementById(`card-${u.username}`);
                        if(!card) {
                            card = document.createElement('div');
                            card.id = `card-${u.username}`;
                            card.className = 'user-card';
                            card.onclick = () => openSafeChat(u);
                            container.appendChild(card);
                        }
                        card.innerHTML = `<img src="${u.photo}"><div style="flex:1"><strong>@${u.username}</strong><br><small>${u.online ? 'متصل 🟢' : 'أوفلاين'}</small></div>`;
                    });
                });
            });
        }

        window.openSafeChat = (other) => {
            targetUserObj = other;
            const chatWin = document.getElementById('chat-window');
            chatWin.style.display = 'flex';
            document.getElementById('chatTargetAvatar').src = other.photo;
            document.getElementById('chat-target-name').innerText = `@${other.username}`;
            
            const chatId = currentAppUser.uid < other.uid ? `${currentAppUser.uid}_${other.uid}` : `${other.uid}_${currentAppUser.uid}`;
            
            // ثيم الشات
            onValue(ref(db, `chat_configs/${chatId}/theme`), (s) => {
                const theme = s.val() || 'theme-default';
                document.getElementById('messages-box').className = 'messages ' + theme;
            });

            // مؤشر الكتابة
            onValue(ref(db, `typing/${chatId}/${other.username}`), (s) => {
                document.getElementById('typing-indicator').style.display = s.val() ? 'block' : 'none';
            });

            if(activeChatRef) off(activeChatRef);
            activeChatRef = ref(db, `secure_chats/${chatId}`);
            document.getElementById('messages-box').innerHTML = "";
            onChildAdded(activeChatRef, (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = `msg ${data.sid === currentAppUser.uid ? 'sent' : 'received'}`;
                div.innerHTML = `${data.txt ? `<div>${data.txt}</div>` : ''} ${data.img ? `<img src="${data.img}" onclick="window.open('${data.img}')">` : ''}`;
                document.getElementById('messages-box').appendChild(div);
                document.getElementById('messages-box').scrollTop = document.getElementById('messages-box').scrollHeight;
            });
        };

        window.setChatTheme = (themeClass) => {
            const chatId = currentAppUser.uid < targetUserObj.uid ? `${currentAppUser.uid}_${targetUserObj.uid}` : `${targetUserObj.uid}_${currentAppUser.uid}`;
            set(ref(db, `chat_configs/${chatId}/theme`), themeClass);
        };

        window.handleTyping = () => {
            const chatId = currentAppUser.uid < targetUserObj.uid ? `${currentAppUser.uid}_${targetUserObj.uid}` : `${targetUserObj.uid}_${currentAppUser.uid}`;
            set(ref(db, `typing/${chatId}/${currentAppUser.username}`), true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                set(ref(db, `typing/${chatId}/${currentAppUser.username}`), false);
            }, 2000);
        };

        window.sendMsg = () => {
            const txt = document.getElementById('msg-input-field').value.trim();
            if(txt) {
                push(activeChatRef, { sid: currentAppUser.uid, txt });
                document.getElementById('msg-input-field').value = "";
                const chatId = currentAppUser.uid < targetUserObj.uid ? `${currentAppUser.uid}_${targetUserObj.uid}` : `${targetUserObj.uid}_${currentAppUser.uid}`;
                set(ref(db, `typing/${chatId}/${currentAppUser.username}`), false);
            }
        };

        window.closeChatWindow = () => document.getElementById('chat-window').style.display = 'none';

        window.switchSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        };

        window.logout = async () => { await signOut(auth); location.reload(); };

    </script>
</body>
</html>
